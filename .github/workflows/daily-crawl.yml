name: Daily Crawl

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out data repo with crawler submodule
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.12"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install crawler dependencies
        working-directory: ./crawler
        run: uv sync --frozen

      - name: Run crawler
        working-directory: ./crawler
        run: |
          uv run stripe-fee-crawler crawl \
            --output .. \
            --atomic \
            --fail-on-regression \
            --report /tmp/crawl-report.json

      - name: Validate generated JSON
        working-directory: ./crawler
        run: uv run stripe-fee-crawler validate ..

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet --exit-code; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage optional change report
        if: steps.changes.outputs.changed == 'true'
        run: |
          if [ -f change-report.json ]; then
            git add change-report.json
          fi

      - name: Add and commit
        if: steps.changes.outputs.changed == 'true'
        uses: EndBug/add-and-commit@v9
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
        with:
          add: 'json meta schemas'
          author_name: Auto Update Bot
          author_email: bot@github.com
          message: 'Daily Stripe fee update'

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-diagnostics
          path: /tmp/crawl-report.json
