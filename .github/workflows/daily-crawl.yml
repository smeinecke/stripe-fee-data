name: Daily Crawl

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      fail_on_regression:
        description: "Fail the workflow if a regression is detected"
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out data repo with crawler submodule
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@b5f58b2abc5763ade55e4e9d0fe52cd1ff7979ca # v5.2.1
        with:
          version: "0.11.12"

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Install crawler dependencies
        working-directory: ./crawler
        run: uv sync --frozen

      - name: Determine regression gate
        id: gate
        run: |
          fail_on_regression="${{ inputs.fail_on_regression }}"
          if [ -z "$fail_on_regression" ]; then
            fail_on_regression="true"
          fi
          echo "fail_on_regression=$fail_on_regression" >> "$GITHUB_OUTPUT"

      - name: Run crawler
        working-directory: ./crawler
        run: |
          uv run stripe-fee-crawler crawl \
            --output .. \
            --atomic \
            ${{ steps.gate.outputs.fail_on_regression == 'true' && '--fail-on-regression' || '' }} \
            --report /tmp/crawl-report.json

      - name: Validate generated JSON
        working-directory: ./crawler
        run: uv run stripe-fee-crawler validate ..

      - name: Update README statistics
        run: python3 scripts/generate_readme.py

      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A -- json meta schemas README.md

          if [ -f change-report.json ]; then
            git add change-report.json
          fi

          if git diff --cached --quiet; then
            echo "No data changes detected."
            exit 0
          fi

          git commit -m "Update Stripe fee data"
          git push origin HEAD:main

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: crawl-diagnostics
          path: /tmp/crawl-report.json
